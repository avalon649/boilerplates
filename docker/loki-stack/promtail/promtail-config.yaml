server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: fake   # required when auth_enabled: false

scrape_configs:

  # --- Scrape all Docker container logs via the Docker socket ---
  - job_name: docker
    docker_sd_configs:
      - host: unix:///run/docker.sock
        refresh_interval: 5s
        filters:
          - name: status
            values: [running]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: compose_service
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: compose_project
      - source_labels: [__meta_docker_image]
        target_label: image
    pipeline_stages:
      - docker: {}        # parse Docker JSON log format
      - drop:
          expression: "^$"  # drop empty lines

  # --- Scrape host system logs ---
  - job_name: system
    static_configs:
      - targets: [localhost]
        labels:
          job: varlogs
          host: docker-host
          __path__: /var/log/*.log

  # --- Scrape syslog ---
  - job_name: syslog
    static_configs:
      - targets: [localhost]
        labels:
          job: syslog
          host: docker-host
          __path__: /var/log/syslog

  # --- Scrape auth log ---
  - job_name: auth
    static_configs:
      - targets: [localhost]
        labels:
          job: auth
          host: docker-host
          __path__: /var/log/auth.log
