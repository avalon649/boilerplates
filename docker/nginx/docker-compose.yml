---
volumes:
  nginx-config:

services:
  nginx:
    image: lscr.io/linuxserver/nginx
    container_name: nginx
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    ports:
      - 8085:80
      - 5443:443
    volumes:
      - ./config:/config
    restart: unless-stopped
