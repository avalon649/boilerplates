---
services:
  nextcloud:
    image: lscr.io/linuxserver/nextcloud
    container_name: nextcloud
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    ports:
      - 9443:443
    volumes:
      - ./appdata:/config
      - ./data:/data
      - local:/local:rw
    restart: always