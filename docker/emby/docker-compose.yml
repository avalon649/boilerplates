---
services:
  emby:
    image: emby/embyserver
    container_name: embyserver
    runtime: nvidia
    networks:
      - backend
    environment:
      - UID=1000
      - GID=1000
      - GIDLIST=1000
    volumes:
      - ./config:/config
      - ./movies:/movies
      - ./series:/series
    ports:
      - 8096:8096
      - 8920:8920
    devices:
      - /dev/dri:/dev/dri
    restart: unless-stopped
