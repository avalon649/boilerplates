---
services:
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    ports:
      - 7878:7878      
    volumes:
      - ./data:/config
      - ./movies:/movies 
      - ./downloads:/downloads 
    restart: unless-stopped      