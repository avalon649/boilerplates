---
networks:
  frontend:
    external: true

services:
  netbootxyz:
    image: lscr.io/linuxserver/netbootxyz:latest
    container_name: netbootxyz
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    ports:
      - 3000:3000
      - 69:69/udp
      - 8080:80
    volumes:
      - ./config:/config
      - ./assets:/assets
    restart: unless-stopped
    networks:
      - frontend


