---
services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - VERSION=docker
      - NVIDIA_VISIBLE_DEVICES=all
      - PLEX_CLAIM=$PLEX_CLAIM
    volumes:
      - ./config:/config
      - ./tvseries:/tv
      - ./movies:/movies
    restart: always