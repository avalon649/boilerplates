---
services:
  readarr:
    image: linuxserver/readarr:latest
    container_name: readarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    ports:
      - 8787:8787
    volumes:
      - ./config:/config
      - ./books:/books
      - ./downloads:/downloads
    restart: unless-stopped